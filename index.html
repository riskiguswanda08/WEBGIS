<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Level Air Pit — Tambang</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<style>
  :root {
    --coal-dark: #1a1f2e;
    --coal-mid:  #252b3b;
    --coal-light:#2f374d;
    --amber:     #f5a623;
    --amber-soft:#fbbf6e;
    --water-blue:#3b9eff;
    --overflow:  #ff5757;
    --lumpur:    #b8860b;
    --missing:   #888ea8;
    --ok:        #2ed573;
    --text-main: #e8eaf0;
    --text-dim:  #8892a4;
    --border:    #3a4157;
    --card:      #222840;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--coal-dark); color: var(--text-main); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── HEADER ── */
  header {
    background: var(--coal-mid);
    border-bottom: 2px solid var(--amber);
    padding: 0 16px;
    height: 54px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; z-index: 1000;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon { width: 32px; height: 32px; background: var(--amber); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .brand h1 { font-size: 14px; font-weight: 700; color: var(--text-main); line-height: 1.2; }
  .brand p  { font-size: 11px; color: var(--amber-soft); }
  .last-update { font-size: 11px; color: var(--text-dim); text-align: right; }
  .last-update strong { color: var(--amber); display: block; }

  /* ── TAB BAR ── */
  .tabs {
    background: var(--coal-mid);
    display: flex; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    flex: 1; padding: 10px 4px; text-align: center; font-size: 12px; font-weight: 600;
    color: var(--text-dim); cursor: pointer; border-bottom: 3px solid transparent;
    transition: all .2s; user-select: none;
  }
  .tab.active { color: var(--amber); border-color: var(--amber); }
  .tab:hover:not(.active) { color: var(--text-main); }

  /* ── PANELS ── */
  .panel { flex: 1; overflow: hidden; display: none; flex-direction: column; }
  .panel.active { display: flex; }

  /* ── MAP PANEL ── */
  #map { flex: 1; }
  .map-legend {
    position: absolute; bottom: 60px; right: 10px; z-index: 900;
    background: rgba(26,31,46,.92); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 11px; backdrop-filter: blur(4px);
  }
  .map-legend h4 { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); margin-bottom: 6px; }
  .leg-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  /* ── FILTER BAR ── */
  .filter-bar {
    background: var(--coal-mid); padding: 8px 12px; display: flex; gap: 8px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .filter-bar input, .filter-bar select {
    background: var(--coal-light); border: 1px solid var(--border); color: var(--text-main);
    padding: 6px 10px; border-radius: 6px; font-size: 12px; outline: none;
    transition: border .2s;
  }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--amber); }
  .filter-bar input { flex: 1; min-width: 140px; }

  /* ── TABLE PANEL ── */
  .table-wrapper { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 520px; }
  thead th {
    background: var(--coal-light); color: var(--text-dim); font-weight: 600;
    text-align: left; padding: 9px 10px; position: sticky; top: 0; z-index: 10;
    text-transform: uppercase; font-size: 10px; letter-spacing: .05em;
    border-bottom: 2px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:hover { color: var(--amber); }
  thead th .sort-arrow { opacity: .4; margin-left: 4px; }
  thead th.asc .sort-arrow::after  { content: ' ▲'; }
  thead th.desc .sort-arrow::after { content: ' ▼'; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; cursor: pointer; }
  tbody tr:hover { background: var(--coal-light); }
  tbody tr.updated-row { border-left: 3px solid var(--amber); }
  td { padding: 8px 10px; vertical-align: middle; }
  td.pit-name { font-weight: 600; color: var(--text-main); }
  td.elevation { font-family: monospace; font-size: 13px; }
  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase;
  }
  .badge-overflow { background: rgba(255,87,87,.2); color: var(--overflow); }
  .badge-lumpur   { background: rgba(184,134,11,.2); color: var(--lumpur); }
  .badge-missing  { background: rgba(136,142,168,.2); color: var(--missing); }
  .badge-updated  { background: rgba(245,166,35,.2); color: var(--amber); }
  .badge-ok       { background: rgba(46,213,115,.15); color: var(--ok); }

  /* ── STATS PANEL ── */
  .stats-scroll { flex: 1; overflow-y: auto; padding: 16px 12px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 12px; text-align: center;
  }
  .stat-card .num { font-size: 28px; font-weight: 800; line-height: 1; }
  .stat-card .lbl { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .stat-card.accent { border-color: var(--amber); }
  .chart-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); margin-bottom: 10px; padding-left: 4px; }
  .bar-chart { display: flex; flex-direction: column; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .bar-label { width: 140px; flex-shrink: 0; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; }
  .bar-track { flex: 1; height: 18px; background: var(--coal-light); border-radius: 4px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 4px; transition: width .4s; display: flex; align-items: center; padding-left: 6px; font-size: 10px; font-weight: 700; color: #fff; }
  .bar-val   { font-size: 11px; color: var(--text-dim); width: 60px; flex-shrink: 0; }
  .divider   { height: 1px; background: var(--border); margin: 14px 0; }

  /* ── POPUP ── */
  .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 2000; align-items: center; justify-content: center; padding: 16px; }
  .popup-overlay.open { display: flex; }
  .popup-card {
    background: var(--coal-mid); border: 1px solid var(--border); border-radius: 14px;
    width: 100%; max-width: 400px; padding: 20px; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .popup-close { position: absolute; top: 12px; right: 14px; font-size: 20px; cursor: pointer; color: var(--text-dim); }
  .popup-close:hover { color: var(--text-main); }
  .popup-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; padding-right: 28px; }
  .popup-elev  { font-size: 36px; font-weight: 800; color: var(--amber); font-family: monospace; }
  .popup-elev span { font-size: 14px; color: var(--text-dim); font-weight: 400; }
  .popup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .popup-field label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: .05em; }
  .popup-field p     { font-size: 13px; font-weight: 600; margin-top: 2px; }

  /* map popup override */
  .leaflet-popup-content-wrapper { background: var(--coal-mid); color: var(--text-main); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
  .leaflet-popup-tip { background: var(--coal-mid); }
  .leaflet-popup-content { margin: 12px 14px; font-size: 12px; min-width: 180px; }
  .lp-name { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
  .lp-elev { font-size: 22px; font-weight: 800; color: var(--amber); font-family: monospace; }
  .lp-sub  { font-size: 10px; color: var(--text-dim); }
  .lp-badges { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--coal-dark); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 420px) {
    .brand p, .last-update { display: none; }
    .tab { font-size: 11px; padding: 10px 2px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">💧</div>
    <div>
      <h1>Monitor Level Air Pit</h1>
      <p>Sistem Pemantauan Tambang Batubara</p>
    </div>
  </div>
  <div class="last-update">
    <strong id="updateDate">16 Jun 2026</strong>
    Update Terakhir
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('map')">🗺️ Peta</div>
  <div class="tab" onclick="switchTab('table')">📋 Tabel</div>
  <div class="tab" onclick="switchTab('stats')">📊 Statistik</div>
</div>

<!-- MAP PANEL -->
<div class="panel active" id="panel-map" style="position:relative;">
  <div id="map"></div>
  <div class="map-legend">
    <h4>Status Pit</h4>
    <div class="leg-row"><div class="leg-dot" style="background:#ff5757"></div> Overflow</div>
    <div class="leg-row"><div class="leg-dot" style="background:#b8860b"></div> Lumpur</div>
    <div class="leg-row"><div class="leg-dot" style="background:#3b9eff"></div> Normal</div>
    <div class="leg-row"><div class="leg-dot" style="background:#888ea8"></div> Missing</div>
  </div>
</div>

<!-- TABLE PANEL -->
<div class="panel" id="panel-table">
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 Cari nama pit..." oninput="applyFilters()">
    <select id="filterStatus" onchange="applyFilters()">
      <option value="">Semua Status</option>
      <option value="overflow">Overflow</option>
      <option value="lumpur">Lumpur</option>
      <option value="missing">Missing</option>
      <option value="updated">Updated</option>
    </select>
    <select id="filterArea" onchange="applyFilters()">
      <option value="">Semua Area</option>
    </select>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th onclick="sortTable('pit')" id="th-pit">Nama Pit <span class="sort-arrow"></span></th>
          <th onclick="sortTable('elevation')" id="th-elevation">Elevasi (m) <span class="sort-arrow"></span></th>
          <th onclick="sortTable('keterangan')" id="th-keterangan">Status <span class="sort-arrow"></span></th>
          <th onclick="sortTable('tanggal')" id="th-tanggal">Tgl Update <span class="sort-arrow"></span></th>
          <th>Area</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- STATS PANEL -->
<div class="panel" id="panel-stats">
  <div class="stats-scroll">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="divider"></div>
    <div class="chart-section">
      <h3>Elevasi Terendah (Top 10)</h3>
      <div class="bar-chart" id="lowChart"></div>
    </div>
    <div class="divider"></div>
    <div class="chart-section">
      <h3>Elevasi Tertinggi (Top 10)</h3>
      <div class="bar-chart" id="highChart"></div>
    </div>
  </div>
</div>

<!-- DETAIL POPUP -->
<div class="popup-overlay" id="detailPopup">
  <div class="popup-card">
    <span class="popup-close" onclick="closePopup()">✕</span>
    <div class="popup-title" id="popupTitle"></div>
    <div class="popup-elev" id="popupElev"></div>
    <div class="popup-grid" id="popupGrid"></div>
  </div>
</div>

proj4.defs("EPSG:32750", "+proj=utm +zone=50 +south +datum=WGS84 +units=m +no_defs");

function utmToLatLng(easting, northing) {
  try {
    const [lng, lat] = proj4("EPSG:32750", "WGS84", [easting, northing]);
    if (lat > -10 && lat < 5 && lng > 105 && lng < 120) return [lat, lng];
  } catch(e) {}
  return null;
}

// augment with latLng
const DATA = RAW.map(d => {
  let ll = null;
  if (d.easting && d.northing) ll = utmToLatLng(d.easting, d.northing);
  return { ...d, latLng: ll };
});

function getStatusKey(d) {
  const k = (d.keterangan||'').toLowerCase();
  const v = (d.volume||'').toLowerCase();
  if (k.includes('overflow')) return 'overflow';
  if (k.includes('lumpur') || v.includes('lumpur')) return 'lumpur';
  if (k.includes('missing')) return 'missing';
  if (d.status === 'Updated') return 'updated';
  return 'ok';
}

function statusBadge(sk) {
  const map = { overflow:'badge-overflow', lumpur:'badge-lumpur', missing:'badge-missing', updated:'badge-updated', ok:'badge-ok' };
  const label = { overflow:'Overflow', lumpur:'Lumpur', missing:'Missing', updated:'Updated', ok:'Normal' };
  return `<span class="badge ${map[sk]}">${label[sk]}</span>`;
}

function markerColor(sk) {
  return { overflow:'#ff5757', lumpur:'#b8860b', missing:'#888ea8', updated:'#f5a623', ok:'#3b9eff' }[sk];
}

// ── MAP ──
const map = L.map('map', { zoomControl: false }).setView([-3.8, 115.4], 10);
L.control.zoom({ position: 'bottomleft' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap', maxZoom: 18
}).addTo(map);

function makeMarker(d) {
  if (!d.latLng) return null;
  const sk = getStatusKey(d);
  const color = markerColor(sk);
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:13px;height:13px;background:${color};border:2px solid rgba(255,255,255,.8);border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,
    iconSize: [13, 13], iconAnchor: [6.5, 6.5], popupAnchor: [0, -8]
  });
  const elStr = d.elevation !== null ? (d.elevation >= 0 ? '+' : '') + d.elevation.toFixed(3) + ' m' : '–';
  const popup = `
    <div class="lp-name">${d.pit}</div>
    <div class="lp-elev">${elStr}</div>
    <div class="lp-sub">Elevasi Level Air</div>
    <div class="lp-badges">
      ${statusBadge(sk)}
      ${d.tanggal ? `<span class="badge" style="background:rgba(255,255,255,.1);color:#8892a4">${d.tanggal}</span>` : ''}
    </div>`;
  return L.marker(d.latLng, { icon }).bindPopup(popup);
}

const markers = [];
DATA.forEach(d => {
  const m = makeMarker(d);
  if (m) { m.addTo(map); markers.push(m); }
});
if (markers.length) {
  const group = L.featureGroup(markers);
  map.fitBounds(group.getBounds().pad(0.08));
}

// ── TABLE ──
let currentData = [...DATA];
let sortKey = 'pit', sortDir = 1;

// populate area filter
const areas = [...new Set(DATA.map(d => (d.keterangan||'').trim().toUpperCase()).filter(Boolean))].sort();
const areaSelect = document.getElementById('filterArea');
areas.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; areaSelect.appendChild(o); });

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const st = document.getElementById('filterStatus').value;
  const ar = document.getElementById('filterArea').value.toLowerCase();
  currentData = DATA.filter(d => {
    const sk = getStatusKey(d);
    const matchQ = !q || d.pit.toLowerCase().includes(q);
    const matchSt = !st || sk === st;
    const matchAr = !ar || (d.keterangan||'').toLowerCase().includes(ar.toLowerCase());
    return matchQ && matchSt && matchAr;
  });
  renderTable();
}

function sortTable(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('asc','desc'));
  const th = document.getElementById('th-'+key);
  if (th) th.classList.add(sortDir === 1 ? 'asc' : 'desc');
  currentData.sort((a,b) => {
    let va = a[key], vb = b[key];
    if (va === null || va === undefined) va = sortDir === 1 ? Infinity : -Infinity;
    if (vb === null || vb === undefined) vb = sortDir === 1 ? Infinity : -Infinity;
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return (va - vb) * sortDir;
  });
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (!currentData.length) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:30px">Tidak ada data ditemukan</td></tr>'; return; }
  tbody.innerHTML = currentData.map((d,i) => {
    const sk = getStatusKey(d);
    const elStr = d.elevation !== null ? (d.elevation >= 0 ? '+' : '') + d.elevation.toFixed(3) : '—';
    const elColor = d.elevation === null ? '' : d.elevation < -50 ? 'color:#ff5757' : d.elevation < 0 ? 'color:#fbbf6e' : 'color:#2ed573';
    const areaLabel = (d.keterangan||'').trim() || '—';
    return `<tr class="${d.status==='Updated'?'updated-row':''}" onclick="showDetail(${RAW.indexOf(RAW.find(r=>r.pit===d.pit&&r.elevation===d.elevation))})">
      <td class="pit-name">${d.pit}</td>
      <td class="elevation" style="${elColor}">${elStr}</td>
      <td>${statusBadge(sk)}</td>
      <td style="color:var(--text-dim)">${d.tanggal||'—'}</td>
      <td style="color:var(--text-dim);font-size:11px">${areaLabel}</td>
    </tr>`;
  }).join('');
}

applyFilters();

// ── STATS ──
function buildStats() {
  const total = DATA.length;
  const withElev = DATA.filter(d => d.elevation !== null);
  const overflow = DATA.filter(d => getStatusKey(d)==='overflow').length;
  const lumpur   = DATA.filter(d => getStatusKey(d)==='lumpur').length;
  const missing  = DATA.filter(d => getStatusKey(d)==='missing').length;
  const updated  = DATA.filter(d => d.status==='Updated').length;
  const minElev  = Math.min(...withElev.map(d=>d.elevation));
  const maxElev  = Math.max(...withElev.map(d=>d.elevation));
  const avgElev  = withElev.reduce((a,d)=>a+d.elevation,0)/withElev.length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card accent"><div class="num" style="color:var(--amber)">${total}</div><div class="lbl">Total Pit</div></div>
    <div class="stat-card"><div class="num" style="color:var(--overflow)">${overflow}</div><div class="lbl">Overflow</div></div>
    <div class="stat-card"><div class="num" style="color:var(--lumpur)">${lumpur}</div><div class="lbl">Lumpur</div></div>
    <div class="stat-card"><div class="num" style="color:var(--missing)">${missing}</div><div class="lbl">Missing</div></div>
    <div class="stat-card"><div class="num" style="color:var(--amber)">${updated}</div><div class="lbl">Updated Hari Ini</div></div>
    <div class="stat-card"><div class="num" style="color:var(--ok);font-size:20px">${minElev.toFixed(1)}m</div><div class="lbl">Elevasi Terendah</div></div>
    <div class="stat-card"><div class="num" style="color:var(--ok);font-size:20px">${maxElev.toFixed(1)}m</div><div class="lbl">Elevasi Tertinggi</div></div>
    <div class="stat-card"><div class="num" style="color:var(--water-blue);font-size:20px">${avgElev.toFixed(1)}m</div><div class="lbl">Rata-Rata Elevasi</div></div>
  `;

  // lowest chart
  const lowest = [...withElev].sort((a,b)=>a.elevation-b.elevation).slice(0,10);
  const maxAbs = Math.max(...lowest.map(d=>Math.abs(d.elevation)));
  document.getElementById('lowChart').innerHTML = lowest.map(d => {
    const w = (Math.abs(d.elevation)/maxAbs*100).toFixed(1);
    const sk = getStatusKey(d);
    return `<div class="bar-row">
      <div class="bar-label" title="${d.pit}">${d.pit}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${markerColor(sk)}">${d.elevation.toFixed(1)}</div></div>
      <div class="bar-val">${d.elevation.toFixed(3)} m</div>
    </div>`;
  }).join('');

  // highest chart
  const highest = [...withElev].sort((a,b)=>b.elevation-a.elevation).slice(0,10);
  const maxH = Math.max(...highest.map(d=>d.elevation));
  document.getElementById('highChart').innerHTML = highest.map(d => {
    const w = (d.elevation/maxH*100).toFixed(1);
    return `<div class="bar-row">
      <div class="bar-label" title="${d.pit}">${d.pit}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:var(--water-blue)">${d.elevation.toFixed(1)}</div></div>
      <div class="bar-val">${d.elevation.toFixed(3)} m</div>
    </div>`;
  }).join('');
}
buildStats();

// ── DETAIL POPUP ──
function showDetail(idx) {
  const d = DATA[idx] || DATA.find((_,i)=>i===idx);
  if (!d) return;
  const sk = getStatusKey(d);
  const elStr = d.elevation !== null ? (d.elevation >= 0 ? '+' : '') + d.elevation.toFixed(3) : '—';
  document.getElementById('popupTitle').textContent = d.pit;
  document.getElementById('popupElev').innerHTML = `${elStr} <span>mdpl</span>`;
  document.getElementById('popupGrid').innerHTML = `
    <div class="popup-field"><label>Status</label><p>${statusBadge(sk)}</p></div>
    <div class="popup-field"><label>Tgl Update</label><p>${d.tanggal||'—'}</p></div>
    <div class="popup-field"><label>Area / Keterangan</label><p>${d.keterangan||'—'}</p></div>
    <div class="popup-field"><label>Volume</label><p>${d.volume||'—'}</p></div>
    ${d.easting ? `<div class="popup-field"><label>Easting</label><p style="font-size:11px">${d.easting.toFixed(3)}</p></div>` : ''}
    ${d.northing ? `<div class="popup-field"><label>Northing</label><p style="font-size:11px">${d.northing.toFixed(3)}</p></div>` : ''}
    ${d.latLng ? `<div class="popup-field"><label>Koordinat</label><p style="font-size:11px">${d.latLng[0].toFixed(5)}, ${d.latLng[1].toFixed(5)}</p></div>` : ''}
  `;
  document.getElementById('detailPopup').classList.add('open');
}

function closePopup() { document.getElementById('detailPopup').classList.remove('open'); }
document.getElementById('detailPopup').addEventListener('click', e => { if (e.target===e.currentTarget) closePopup(); });

// ── TAB SWITCH ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', ['map','table','stats'][i]===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active', p.id==='panel-'+name));
  if (name==='map') setTimeout(()=>map.invalidateSize(), 100);
}
</script>
